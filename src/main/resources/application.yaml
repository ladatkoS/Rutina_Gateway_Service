server:
  port: 8081

spring:
  application:
    name: rutina-gateway
  cloud:
    gateway:
      routes:
        - id: rutina-auth
          uri: http://localhost:8082
          predicates:
            - Path=/auth/**, /admin/**
          filters:
            - StripPrefix=0

        - id: rutina-main
          uri: http://localhost:8083
          predicates:
            - Path=/users/**
          filters:
            - StripPrefix=0

logging:
  level:
    org.springframework.cloud.gateway: DEBUG